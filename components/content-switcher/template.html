<!--
  Content Switcher — Template
  Source: components/content-switcher/mainifest.json

  Usage:
    Size:    Add content-switcher--sm | content-switcher--md | content-switcher--lg
    OnColor: Add content-switcher--on-color
    RTL:     Add dir="rtl" on the container (no extra class needed)

  Accessibility:
    - role="tablist" on container with aria-label or aria-labelledby
    - role="tab" + aria-selected="true|false" on each item
    - tabindex="0" on active item; tabindex="-1" on inactive items (roving tabindex)
    - aria-controls pointing to the associated tabpanel id
    - Keyboard: Arrow Left/Right to navigate; Home/End for first/last; Tab to exit
    - JavaScript required for activation and panel switching
-->

<!-- ============================================================
     Variant: Medium — OnColor=False (default) — LTR
     ============================================================ -->
<div
  class="content-switcher content-switcher--md"
  role="tablist"
  aria-label="View options"
>
  <button
    class="content-switcher__item"
    role="tab"
    aria-selected="true"
    aria-controls="panel-1"
    id="tab-1"
    tabindex="0"
    type="button"
  >
    Item
  </button>
  <button
    class="content-switcher__item"
    role="tab"
    aria-selected="false"
    aria-controls="panel-2"
    id="tab-2"
    tabindex="-1"
    type="button"
  >
    Item
  </button>
  <button
    class="content-switcher__item"
    role="tab"
    aria-selected="false"
    aria-controls="panel-3"
    id="tab-3"
    tabindex="-1"
    type="button"
  >
    Item
  </button>
  <button
    class="content-switcher__item"
    role="tab"
    aria-selected="false"
    aria-controls="panel-4"
    id="tab-4"
    tabindex="-1"
    type="button"
  >
    Item
  </button>
</div>
