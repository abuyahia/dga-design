<!-- ============================================================
  Divider — Reference Template
  Contract: divider.contract.md
  CSS:      divider.css
  ============================================================ -->


<!-- ── Horizontal / Neutral (default) ──────────────────── -->
<hr class="divider" />


<!-- ── Horizontal / Primary ────────────────────────────── -->
<hr class="divider divider--primary" />


<!-- ── Horizontal / Alpha White (on dark bg) ───────────── -->
<hr class="divider divider--alpha-white" />


<!-- ── Horizontal / White (on dark bg) ─────────────────── -->
<hr class="divider divider--white" />


<!-- ── Vertical / Neutral ──────────────────────────────── -->
<!--
  Note: vertical divider requires a parent container with
  a defined height (not height: auto) for 100% to resolve.
-->
<hr class="divider divider--vertical" aria-orientation="vertical" />


<!-- ── Vertical / Primary ──────────────────────────────── -->
<hr class="divider divider--vertical divider--primary" aria-orientation="vertical" />


<!-- ── Vertical / Alpha White (on dark bg) ─────────────── -->
<hr class="divider divider--vertical divider--alpha-white" aria-orientation="vertical" />


<!-- ── Vertical / White (on dark bg) ───────────────────── -->
<hr class="divider divider--vertical divider--white" aria-orientation="vertical" />


<!-- ── Decorative (no semantic meaning) ─────────────────── -->
<!--
  Use role="none" and aria-hidden="true" when the divider
  is purely decorative and does not represent a content boundary.
-->
<hr class="divider" role="none" aria-hidden="true" />
