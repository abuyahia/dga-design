<!--
  Slider — Platform Code Design System
  Template: template.html
  Contract: slider.contract.md
  Analysis: analysis.md

  USAGE:
    Include token.css and slider.css before this template.

  NOTE:
    .slider__fill requires JavaScript to update --fill (single)
    or --fill-start / --fill-end (range) CSS custom properties.
    See slider.contract.md §JavaScript Contract for the required JS.
-->

<!-- ═══════════════════════════════════════════════════
     Single Slider — Small (default)
     ═══════════════════════════════════════════════════ -->
<div class="slider" data-component="slider">
  <label class="slider__label-text" for="slider-sm">Label</label>
  <div class="slider__track-row">
    <div class="slider__control-wrap">
      <div class="slider__track" aria-hidden="true">
        <div class="slider__fill" style="--fill: 20%"></div>
      </div>
      <input
        type="range"
        class="slider__input"
        id="slider-sm"
        min="0"
        max="100"
        value="20"
        aria-describedby="slider-sm-helper"
      >
    </div>
    <output class="slider__value" for="slider-sm" aria-hidden="true">20</output>
  </div>
  <div class="slider__helper" id="slider-sm-helper">
    <span class="slider__helper-icon" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 7v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="4.5" r="0.75" fill="currentColor"/>
      </svg>
    </span>
    <span class="slider__helper-text">Help Text</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     Range Slider — Small
     ═══════════════════════════════════════════════════ -->
<div class="slider slider--range" data-component="slider">
  <label class="slider__label-text" id="range-lbl-sm">Label</label>
  <div class="slider__track-row">
    <output class="slider__value" aria-hidden="true">20</output>
    <div class="slider__control-wrap">
      <div class="slider__track" aria-hidden="true">
        <div class="slider__fill" style="--fill-start: 20%; --fill-end: 70%"></div>
      </div>
      <input
        type="range"
        class="slider__input"
        min="0"
        max="100"
        value="20"
        aria-label="Minimum value"
        aria-labelledby="range-lbl-sm"
        aria-describedby="range-helper-sm"
      >
      <input
        type="range"
        class="slider__input slider__input--end"
        min="0"
        max="100"
        value="70"
        aria-label="Maximum value"
        aria-labelledby="range-lbl-sm"
        aria-describedby="range-helper-sm"
      >
    </div>
    <output class="slider__value slider__value--end" aria-hidden="true">70</output>
  </div>
  <div class="slider__helper" id="range-helper-sm">
    <span class="slider__helper-icon" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 7v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="4.5" r="0.75" fill="currentColor"/>
      </svg>
    </span>
    <span class="slider__helper-text">Help Text</span>
  </div>
</div>
