<!--
  Floating Button — HTML Templates
  Reference: floating-button.contract.md, reference.json

  Anatomy:
    <button type="button" class="fab [modifiers]" aria-label="[label]">
      <span class="fab__icon" aria-hidden="true"><svg>...</svg></span>
      <span class="fab__label">[label text]</span>  ← labeled mode only
    </button>

  Modifiers:
    Style:   (none) = Primary-Neutral | .fab--primary-brand | .fab--secondary-solid
    Size:    (none) = Small            | .fab--lg
    Context: (none) = Default          | .fab--on-color
    States:  :hover (auto) | :focus/:focus-visible (auto) | :active (auto)
             [disabled]    | [aria-pressed="true"]

  Note: aria-label is REQUIRED for icon-only buttons (no visible label).
-->

<!-- ── SVG icon reusable reference ─────────────────────────────
     Replace with your icon system. Must be 24×24 viewBox.
     currentColor inherits the button text/icon color.
────────────────────────────────────────────────────────────── -->

<!-- =============================================================
     Primary-Neutral — Icon Only
     ============================================================= -->

<!-- Small (default) -->
<button type="button" class="fab" aria-label="Add item">
  <span class="fab__icon" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</button>

<!-- Large -->
<button type="button" class="fab fab--lg" aria-label="Add item">
  <span class="fab__icon" aria-hidden="true">

</button>
