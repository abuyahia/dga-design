<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label — Showcase</title>

    <!-- 1. Design tokens -->
    <link rel="stylesheet" href="../../../token.css" />
    <!-- 2. Component styles -->
    <link rel="stylesheet" href="../label.css" />
    <!-- 3. Shared showcase infrastructure -->
    <link rel="stylesheet" href="../../_showcase/showcase.css" />
    <script src="../../_showcase/showcase.js" defer></script>

    <style>
      /* ── Dummy input (for label association only) ─────── */
      .demo-input {
        display: block;
        height: 36px;
        padding: 0 var(--space-12, 12px);
        border: 1px solid var(--gray-300, #d1d5db);
        border-radius: var(--radius-sm, 4px);
        font-family: var(--font-sans, system-ui, sans-serif);
        font-size: var(--fs-text-sm, 14px);
        color: var(--gray-900, #111827);
        background: var(--white, #ffffff);
        outline: none;
        width: 220px;
        margin-top: var(--space-4, 4px);
      }

      .demo-input:focus {
        border-color: var(--sa-600, #1b8354);
        box-shadow: 0 0 0 2px rgba(27, 131, 84, 0.2);
      }

      .demo-input[disabled] {
        background: var(--gray-100, #f3f4f6);
        border-color: var(--gray-200, #e5e7eb);
        color: var(--gray-400, #9ca3af);
        cursor: not-allowed;
      }
    </style>
  </head>

  <body data-showcase data-current-component="label" data-showcase-title="Label Showcase">
    <div data-showcase-shell>
      <main data-showcase-content class="page">

        <!-- ══════════════════════════════════════════════════════
             MEDIUM / REGULAR
             ══════════════════════════════════════════════════════ -->
        <section class="variant">
          <h2 class="variant__title">Medium — Regular</h2>

          <div class="showcase">

            <!-- Default -->
            <div class="showcase__row" data-props="RTL=False, Type=Regular (Default), Size=Medium, Disabled=False">
              <span class="showcase__label">Default</span>
              <div class="showcase__item">
                <label class="label" for="sc-md-reg-default">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Full Name</span>
                </label>
                <input class="demo-input" id="sc-md-reg-default" type="text" aria-required="true" placeholder="e.g. Ahmad Al-Hassan" />
              </div>
            </div>

            <!-- Disabled -->
            <div class="showcase__row" data-props="RTL=False, Type=Regular (Default), Size=Medium, Disabled=True">
              <span class="showcase__label">Disabled</span>
              <div class="showcase__item">
                <label class="label label--disabled" aria-disabled="true" for="sc-md-reg-disabled">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Full Name</span>
                </label>
                <input class="demo-input" id="sc-md-reg-disabled" type="text" disabled placeholder="e.g. Ahmad Al-Hassan" />
              </div>
            </div>

            <!-- Optional (no required asterisk) — implementation usage pattern -->
            <div class="showcase__row">
              <span class="showcase__label">Optional</span>
              <div class="showcase__item">
                <label class="label" for="sc-md-reg-optional">
                  <span class="label__text">Middle Name</span>
                </label>
                <input class="demo-input" id="sc-md-reg-optional" type="text" placeholder="Optional field" />
              </div>
            </div>

          </div>
        </section>

        <!-- ══════════════════════════════════════════════════════
             MEDIUM / SEMIBOLD
             ══════════════════════════════════════════════════════ -->
        <section class="variant">
          <h2 class="variant__title">Medium — Semibold</h2>

          <div class="showcase">

            <!-- Default -->
            <div class="showcase__row" data-props="RTL=False, Type=Semibold, Size=Medium, Disabled=False">
              <span class="showcase__label">Default</span>
              <div class="showcase__item">
                <label class="label label--semibold" for="sc-md-semi-default">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">National ID</span>
                </label>
                <input class="demo-input" id="sc-md-semi-default" type="text" aria-required="true" placeholder="e.g. 1234567890" />
              </div>
            </div>

            <!-- Disabled -->
            <div class="showcase__row" data-props="RTL=False, Type=Semibold, Size=Medium, Disabled=True">
              <span class="showcase__label">Disabled</span>
              <div class="showcase__item">
                <label class="label label--semibold label--disabled" aria-disabled="true" for="sc-md-semi-disabled">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">National ID</span>
                </label>
                <input class="demo-input" id="sc-md-semi-disabled" type="text" disabled placeholder="e.g. 1234567890" />
              </div>
            </div>

          </div>
        </section>

        <!-- ══════════════════════════════════════════════════════
             LARGE / REGULAR
             ══════════════════════════════════════════════════════ -->
        <section class="variant">
          <h2 class="variant__title">Large — Regular</h2>

          <div class="showcase">

            <!-- Default -->
            <div class="showcase__row" data-props="RTL=False, Type=Regular (Default), Size=Large, Disabled=False">
              <span class="showcase__label">Default</span>
              <div class="showcase__item">
                <label class="label label--large" for="sc-lg-reg-default">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Email Address</span>
                </label>
                <input class="demo-input" id="sc-lg-reg-default" type="email" aria-required="true" placeholder="e.g. name@example.com" />
              </div>
            </div>

            <!-- Disabled -->
            <div class="showcase__row" data-props="RTL=False, Type=Regular (Default), Size=Large, Disabled=True">
              <span class="showcase__label">Disabled</span>
              <div class="showcase__item">
                <label class="label label--large label--disabled" aria-disabled="true" for="sc-lg-reg-disabled">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Email Address</span>
                </label>
                <input class="demo-input" id="sc-lg-reg-disabled" type="email" disabled placeholder="e.g. name@example.com" />
              </div>
            </div>

          </div>
        </section>

        <!-- ══════════════════════════════════════════════════════
             LARGE / SEMIBOLD
             ══════════════════════════════════════════════════════ -->
        <section class="variant">
          <h2 class="variant__title">Large — Semibold</h2>

          <div class="showcase">

            <!-- Default -->
            <div class="showcase__row" data-props="RTL=False, Type=Semibold, Size=Large, Disabled=False">
              <span class="showcase__label">Default</span>
              <div class="showcase__item">
                <label class="label label--large label--semibold" for="sc-lg-semi-default">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Phone Number</span>
                </label>
                <input class="demo-input" id="sc-lg-semi-default" type="tel" aria-required="true" placeholder="e.g. +966 5X XXX XXXX" />
              </div>
            </div>

            <!-- Disabled -->
            <div class="showcase__row" data-props="RTL=False, Type=Semibold, Size=Large, Disabled=True">
              <span class="showcase__label">Disabled</span>
              <div class="showcase__item">
                <label class="label label--large label--semibold label--disabled" aria-disabled="true" for="sc-lg-semi-disabled">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">Phone Number</span>
                </label>
                <input class="demo-input" id="sc-lg-semi-disabled" type="tel" disabled placeholder="e.g. +966 5X XXX XXXX" />
              </div>
            </div>

          </div>
        </section>

        <!-- ══════════════════════════════════════════════════════
             RTL — ARABIC
             dir="rtl" set per-label; in production it inherits from
             <html dir="rtl"> or the nearest ancestor.
             ══════════════════════════════════════════════════════ -->
        <section class="variant">
          <h2 class="variant__title">RTL — Arabic</h2>

          <div class="showcase showcase--rtl">

            <!-- Medium / Regular / Default / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Regular (Default), Size=Medium, Disabled=False">
              <span class="showcase__label">Medium</span>
              <div class="showcase__item">
                <label class="label" dir="rtl" for="sc-rtl-md-reg">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">الاسم الكامل</span>
                </label>
                <input class="demo-input" id="sc-rtl-md-reg" type="text" dir="rtl" aria-required="true" placeholder="مثال: أحمد الحسن" />
              </div>
            </div>

            <!-- Medium / Semibold / Default / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Semibold, Size=Medium, Disabled=False">
              <span class="showcase__label">Medium Semibold</span>
              <div class="showcase__item">
                <label class="label label--semibold" dir="rtl" for="sc-rtl-md-semi">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">رقم الهوية</span>
                </label>
                <input class="demo-input" id="sc-rtl-md-semi" type="text" dir="rtl" aria-required="true" placeholder="مثال: ١٢٣٤٥٦٧٨٩٠" />
              </div>
            </div>

            <!-- Large / Regular / Default / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Regular (Default), Size=Large, Disabled=False">
              <span class="showcase__label">Large</span>
              <div class="showcase__item">
                <label class="label label--large" dir="rtl" for="sc-rtl-lg-reg">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">البريد الإلكتروني</span>
                </label>
                <input class="demo-input" id="sc-rtl-lg-reg" type="email" dir="rtl" aria-required="true" placeholder="مثال: name@example.com" />
              </div>
            </div>

            <!-- Large / Semibold / Default / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Semibold, Size=Large, Disabled=False">
              <span class="showcase__label">Large Semibold</span>
              <div class="showcase__item">
                <label class="label label--large label--semibold" dir="rtl" for="sc-rtl-lg-semi">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">رقم الجوال</span>
                </label>
                <input class="demo-input" id="sc-rtl-lg-semi" type="tel" dir="rtl" aria-required="true" placeholder="مثال: ٩٦٦٥XXXXXXXXX+" />
              </div>
            </div>

            <!-- Medium / Regular / Disabled / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Regular (Default), Size=Medium, Disabled=True">
              <span class="showcase__label">Disabled</span>
              <div class="showcase__item">
                <label class="label label--disabled" aria-disabled="true" dir="rtl" for="sc-rtl-md-disabled">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">الاسم الكامل</span>
                </label>
                <input class="demo-input" id="sc-rtl-md-disabled" type="text" dir="rtl" disabled placeholder="مثال: أحمد الحسن" />
              </div>
            </div>

            <!-- Large / Semibold / Disabled / RTL -->
            <div class="showcase__row" data-props="RTL=True, Type=Semibold, Size=Large, Disabled=True">
              <span class="showcase__label">Large Semibold Disabled</span>
              <div class="showcase__item">
                <label class="label label--large label--semibold label--disabled" aria-disabled="true" dir="rtl" for="sc-rtl-lg-semi-dis">
                  <span class="label__required" aria-hidden="true">*</span>
                  <span class="label__text">رقم الجوال</span>
                </label>
                <input class="demo-input" id="sc-rtl-lg-semi-dis" type="tel" dir="rtl" disabled placeholder="مثال: ٩٦٦٥XXXXXXXXX+" />
              </div>
            </div>

          </div>
        </section>

      </main>
    </div>
  </body>
</html>
