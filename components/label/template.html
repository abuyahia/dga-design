<!-- =============================================================
     Label — Template Examples
     Reference: label/reference.json
     ============================================================= -->

<!-- ── Medium / Regular / Enabled / LTR (default) ─────────────── -->
<label class="label" for="field-id">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Medium / Regular / Enabled / LTR — optional (no required) -->
<label class="label" for="optional-field-id">
  <span class="label__text">Label</span>
</label>

<!-- ── Medium / Semibold / Enabled / LTR ───────────────────────── -->
<label class="label label--semibold" for="field-id">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Medium / Regular / Disabled / LTR ───────────────────────── -->
<label class="label label--disabled" aria-disabled="true" for="field-id">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Medium / Semibold / Disabled / LTR ──────────────────────── -->
<label class="label label--semibold label--disabled" aria-disabled="true" for="field-id">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Large / Regular / Enabled / LTR ─────────────────────────── -->
<label class="label label--large" for="field-id-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Large / Semibold / Enabled / LTR ────────────────────────── -->
<label class="label label--large label--semibold" for="field-id-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Large / Regular / Disabled / LTR ────────────────────────── -->
<label class="label label--large label--disabled" aria-disabled="true" for="field-id-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Large / Semibold / Disabled / LTR ───────────────────────── -->
<label class="label label--large label--semibold label--disabled" aria-disabled="true" for="field-id-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">Label</span>
</label>

<!-- ── Medium / Regular / Enabled / RTL ─────────────────────────
     dir="rtl" can also be set on an ancestor element (e.g. <html dir="rtl">).
     DOM child order stays constant — inline-flex reverses visually.
     ─────────────────────────────────────────────────────────────── -->
<label class="label" dir="rtl" for="field-id-rtl">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Medium / Semibold / Enabled / RTL ───────────────────────── -->
<label class="label label--semibold" dir="rtl" for="field-id-rtl">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Medium / Regular / Disabled / RTL ───────────────────────── -->
<label class="label label--disabled" aria-disabled="true" dir="rtl" for="field-id-rtl">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Large / Regular / Enabled / RTL ─────────────────────────── -->
<label class="label label--large" dir="rtl" for="field-id-rtl-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Large / Semibold / Enabled / RTL ────────────────────────── -->
<label class="label label--large label--semibold" dir="rtl" for="field-id-rtl-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Large / Regular / Disabled / RTL ────────────────────────── -->
<label class="label label--large label--disabled" aria-disabled="true" dir="rtl" for="field-id-rtl-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>

<!-- ── Large / Semibold / Disabled / RTL ───────────────────────── -->
<label class="label label--large label--semibold label--disabled" aria-disabled="true" dir="rtl" for="field-id-rtl-lg">
  <span class="label__required" aria-hidden="true">*</span>
  <span class="label__text">عنوان</span>
</label>
