<!--
  Checkbox — Template
  Component:  checkbox
  Contract:   checkbox.contract.md
  CSS:        checkbox.css

  USAGE PATTERN:
  - Wrap the native input + visual span inside a <label class="checkbox-wrapper">.
  - The .checkbox span is aria-hidden="true" — all semantics live on the native <input>.
  - Add modifier classes for size (.checkbox--md | --sm | --xs) and style (.checkbox--primary | --neutral).
  - Sync state classes (.checkbox--checked, .checkbox--indeterminate, .checkbox--focused,
    .checkbox--readonly, .checkbox--disabled) via JavaScript.
  - For indeterminate: also call inputElement.indeterminate = true AND set aria-checked="mixed".

  SVG PATHS NOTE:
  The checkmark and indeterminate dash SVG paths below are standard proxy shapes.
  Confirm actual vector paths from Figma before production release.
-->

<!-- ============================================================
     PATTERN 1 — Unchecked, Primary, Medium (default)
     ============================================================ -->
<label class="checkbox-wrapper" for="chk-example-1">
  <input
    type="checkbox"
    class="checkbox__input sr-only"
    id="chk-example-1"
  />
  <span class="checkbox checkbox--md checkbox--primary" aria-hidden="true">
    <span class="checkbox__control">
      <span class="checkbox__checkmark">
        <svg
          class="checkbox__icon"
          aria-hidden="true"
          viewBox="0 0 12 9.116"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M1.5 4.5L4.833 7.833L10.5 1.5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span class="checkbox__indeterminate-mark">
        <svg
          class="checkbox__icon"
          aria-hidden="true"
          viewBox="0 0 12 3"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="12" height="3" rx="1.5" fill="currentColor" />
        </svg>
      </span>
    </span>
    <span class="checkbox__focus-ring"></span>
  </span>
  <span class="checkbox-label">Option label</span>
</label>

</script>
